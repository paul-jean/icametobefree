name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never let two deploys race; always ship the newest commit.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # build.py renders the link-preview cards with Pillow. The runner is clean
      # — anything not installed here is not present, however well it works on
      # a laptop that happens to have it.
      - name: Install build dependencies
        run: python3 -m pip install --quiet -r requirements.txt

      - name: Validate quotes.json
        run: python3 scripts/check.py

      - name: Generate per-quote share pages
        run: python3 scripts/build.py

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
